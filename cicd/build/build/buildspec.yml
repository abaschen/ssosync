version: 0.2

env:
  variables:
    GOROOT:
    GOPATH:
    GO111MODULE: "on"
    git-credential-helper: yes
    GOVERSION: go1.24.3
    VERSION_LINT: v2.1.6

phases:
  install:
    commands:
      # Update the repos
      #- apt-get -qq --yes update && apt-get -qq --yes upgrade
      - BUILD_DIR=$PWD
      - cd /root/.goenv/plugins/go-build/../.. && git pull && cd -
      - cd /root/.goenv && git fetch --all && git pull
      - cd $BUILD_DIR
      - goenv install ${GOVERSION#go}
      - goenv global ${GOVERSION#go}
      - goenv rehash
      # Install linter
      - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.1.6
      - golangci-lint --version

  pre_build:
    commands:
      # Print all environment variables (handy for AWS CodeBuild logs)
      - env
      - go version
      - "[ \"$(go version | awk '{print $3}')\" = \"${GOVERSION}\" ] || (echo \"Wrong go version\" && exit 1)"

      # Fetch all dependencies
      # - go env -w GOPROXY=direct
      - make install

      # Check the Go code for common problems with 'go vet'
      - make vet

      # Run all tests included with our application
      - make test


  build:
    commands:
      # Make clean
      - make clean

      # Make go-build
      - make build

  post_build:
    commands:
      # Check we've packaged something useful
      - ./dist/ssosync_linux_amd64_v1/ssosync --version
cache:
  paths:
  - /root/.cache/go-build/**/*
  - '/go/pkg/**/*'
artifacts:
  files:
    - dist/**/*
